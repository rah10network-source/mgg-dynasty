name: Deploy MGG Dynasty

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Injected from GitHub → Settings → Secrets and variables → Actions
          # Name: VITE_LEAGUE_API_KEY   Value: sk-ant-api03-...
          # Vite bakes VITE_* env vars into the bundle at build time.
          # The key ends up in the JS bundle (readable in DevTools) but is
          # gated behind the Sleeper login + league membership check.
          VITE_LEAGUE_API_KEY: ${{ secrets.VITE_LEAGUE_API_KEY }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
