<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MGG Dynasty — Live Intelligence Board</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080d14; color: #e2e8f0; font-family: 'Courier New', monospace; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f1923; }
    ::-webkit-scrollbar-thumb { background: #1e2d3d; border-radius: 3px; }
    input, select, button { font-family: 'Courier New', monospace; }
    table { border-collapse: collapse; width: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useRef } = React;

    const LEAGUE_ID = "1178580692040589312";
    const SLEEPER   = "https://api.sleeper.app/v1";

    const SCARCITY  = { QB:2.0, RB:1.7, WR:1.3, TE:1.5, DL:1.0, LB:1.0, DB:0.95, K:0.6 };
    const PRIME     = { QB:[25,34,38], RB:[23,27,30], WR:[23,29,33], TE:[24,31,35],
                        DL:[23,29,33], LB:[23,28,32], DB:[23,28,32], K:[24,35,42] };
    const POS_ORDER = ["QB","RB","WR","TE","DL","LB","DB","K"];

    // ── PICK VALUES — placeholder, calibrate with simulation data later ───────
    const PICK_VALUES = { "1st":[72,60,48], "2nd":[38,30,24], "3rd":[18,14,10] };
    const PICK_ROUNDS = ["1st","2nd","3rd"];
    const PICK_YEARS  = [2026,2027,2028];
    const pickValue   = (round, yearOffset) => (PICK_VALUES[round]||[10,8,6])[Math.min(yearOffset,2)];

    const TIER_STYLE = {
      Elite:   { bg:"#0f2b1a", border:"#22c55e", text:"#4ade80", glow:"rgba(34,197,94,0.3)"   },
      Starter: { bg:"#0c1e35", border:"#3b82f6", text:"#60a5fa", glow:"rgba(59,130,246,0.3)"  },
      Flex:    { bg:"#2b1f05", border:"#f59e0b", text:"#fbbf24", glow:"rgba(245,158,11,0.3)"  },
      Depth:   { bg:"#2b0f05", border:"#f97316", text:"#fb923c", glow:"rgba(249,115,22,0.25)" },
      Stash:   { bg:"#111827", border:"#4b5563", text:"#9ca3af", glow:"rgba(75,85,99,0.2)"    },
    };
    const INJ_COLOR  = { Out:"#ef4444", Doubtful:"#f97316", Questionable:"#eab308", IR:"#a855f7", PUP:"#a855f7" };
    const SIG_COLORS = { BUY:"#22c55e", HOLD:"#3b82f6", SELL:"#ef4444", WATCH:"#f59e0b" };
    const SIT_ICONS  = { Stable:"▲", Improving:"↑", Declining:"↓", Unknown:"?" };

    // ─── SITUATION LAYER ──────────────────────────────────────────────────────
    // Flags: score impact, badge color, label
    const SITUATION_FLAGS = {
      // ── Opportunity flags ─────────────────────────────────────────────────
      BREAKOUT_YOUNG:  { label:"BREAKOUT★", color:"#22c55e", impact: 0.15, desc:"Age ≤23 + expanded role — buy-and-hold dynasty asset" },
      BREAKOUT_ROLE:   { label:"BREAKOUT↑", color:"#4ade80", impact: 0.08, desc:"Role expansion, 24+ — sell-high window in 12 months" },
      DEPTH_PROMOTED:  { label:"PROMOTED",  color:"#0ea5e9", impact: 0.12, desc:"Moved to starter due to injury ahead of them" },
      CONTRACT_YEAR:   { label:"CONTRACT",  color:"#f59e0b", impact: 0.05, desc:"Playing for next deal — historically outperform" },
      // ── Risk flags ────────────────────────────────────────────────────────
      NEW_OC:          { label:"NEW OC",    color:"#a855f7", impact: 0.00, desc:"Coordinator/scheme change — direction unknown" },
      CAMP_BATTLE:     { label:"CAMP ⚔",   color:"#f59e0b", impact:-0.08, desc:"Depth chart competition ongoing" },
      IR_RETURN:       { label:"IR RETURN", color:"#0ea5e9", impact:-0.05, desc:"Returning from injured reserve — durability risk" },
      FREE_AGENT:      { label:"FREE AGENT",color:"#ef4444", impact:-0.20, desc:"Released — team, scheme, and role all unknown" },
      TRADE_DEMAND:    { label:"TRADE REQ", color:"#ef4444", impact:-0.15, desc:"Requested trade — usage and motivation risk" },
      // ── Auto-derived flags (set by scoring engine, not manual) ───────────
      AGE_CLIFF:       { label:"AGE CLIFF", color:"#f97316", impact:-0.12, desc:"Past positional prime — value declining, consider selling" },
      // ── Special: SUSPENSION uses games field, not flat impact ─────────────
      // impact is overridden by (17 - games) / 17 multiplier
      SUSPENSION:      { label:"SUSPEND",   color:"#dc2626", impact: 0.00, desc:"Suspended — discount based on games missed" },
    };

    // Compute effective multiplier for a situation (handles SUSPENSION separately)
    const sitMultiplier = (p) => {
      const flag = p.situationFlag;
      if (!flag) return 1.0;
      if (flag === "SUSPENSION") {
        const games = p.situationGames || 6; // default 6 if not specified
        return Math.max(0.1, (17 - games) / 17);
      }
      if (flag === "AGE_CLIFF") return 1 + SITUATION_FLAGS.AGE_CLIFF.impact;
      return 1 + (SITUATION_FLAGS[flag]?.impact || 0);
    };

    // ── EDIT THIS SECTION each offseason with known team situations ───────────
    // Format: "Player Full Name": { flag:"FLAG_KEY", note:"Brief note", games:N }
    // flag options: BREAKOUT_YOUNG | BREAKOUT_ROLE | DEPTH_PROMOTED | CONTRACT_YEAR |
    //               NEW_OC | CAMP_BATTLE | IR_RETURN | FREE_AGENT | TRADE_DEMAND | SUSPENSION
    // SUSPENSION only: add games:N field (e.g. games:6) — discount = (17-N)/17
    const MANUAL_SITUATIONS = {
      "Kyler Murray":      { flag:"FREE_AGENT",  note:"Released by ARI 3/11 — linked to Vikings, landing spot TBD. $36.8M guaranteed." },
      "Jacoby Brissett":   { flag:"BREAKOUT_ROLE", note:"3,366yds 23TD in 2025 as ARI starter — now QB1 candidate in free market" },
      "Bryce Young":       { flag:"CAMP_BATTLE", note:"Starting job not guaranteed heading into camp" },
      "Anthony Richardson":{ flag:"IR_RETURN",   note:"Returning from shoulder surgery — workload uncertain" },
      "Christian Kirk":    { flag:"IR_RETURN",   note:"Returning from IR — target share competition expected" },
    };

    // Keyword patterns for auto-detection from news headlines
    const SITUATION_PATTERNS = [
      { flag:"NEW_OC",         patterns:["offensive coordinator","new oc","hired as oc","scheme change","new offensive coordinator"] },
      { flag:"CAMP_BATTLE",    patterns:["competition","camp battle","depth chart battle","competing for starting","position battle","fight for"] },
      { flag:"BREAKOUT_ROLE",  patterns:["lead back","featured back","every down back","target share","expanded role","wr1","breakout","bell cow"] },
      { flag:"IR_RETURN",      patterns:["return from ir","activated from ir","cleared to return","return from injury","comeback","off injured reserve"] },
      { flag:"TRADE_DEMAND",   patterns:["trade request","requested trade","wants out","unhappy","demands trade","trade demand"] },
      { flag:"DEPTH_PROMOTED", patterns:["named starter","takes over","steps in","promoted to starter","filling in","starting in place"] },
    ];

    // Auto-upgrade BREAKOUT_ROLE → BREAKOUT_YOUNG if player is ≤23
    const resolveBreakoutFlag = (flag, age) => {
      if (flag === "BREAKOUT_ROLE" && age != null && age <= 23) return "BREAKOUT_YOUNG";
      return flag;
    };

    const detectSituation = (playerName, headlines) => {
      const nameParts = playerName.toLowerCase().split(" ");
      const lastName  = nameParts[nameParts.length-1];
      const relevant  = headlines.filter(h => h.toLowerCase().includes(lastName));
      if (!relevant.length) return null;
      const combined  = relevant.join(" ").toLowerCase();
      for (const { flag, patterns } of SITUATION_PATTERNS) {
        if (patterns.some(p => combined.includes(p))) return flag;
      }
      return null;
    };

    // ─── HELPERS ──────────────────────────────────────────────────────────────
    const calcAge = bd => {
      if (!bd) return null;
      const today = new Date(2026,2,6);
      const b = new Date(typeof bd==="number" ? bd*1000 : bd);
      if (isNaN(b.getTime())) return null;
      return +((today-b)/(365.25*86400000)).toFixed(1);
    };

    const ageScore = (age, pos) => {
      if (!age) return 45;
      const [rise,peak,cliff] = PRIME[pos]||[23,29,33];
      if (age<21) return 60;
      if (age<=rise) return 70+(age-21)/(rise-21)*15;
      if (age<=peak) return 85+(age-rise)/(peak-rise)*15;
      if (age<=cliff) return Math.max(100-(age-peak)/(cliff-peak)*60,40);
      return Math.max(40-(age-cliff)*8,0);
    };

    const normalise = (arr, key) => {
      const vals = arr.map(x=>x[key]??0);
      const mn=Math.min(...vals), mx=Math.max(...vals);
      return arr.map(x=>({...x,[`${key}_n`]:mx>mn?((x[key]??0)-mn)/(mx-mn)*100:50}));
    };

    const sf = async (path) => {
      const ctrl = new AbortController();
      const t = setTimeout(()=>ctrl.abort(), 12000);
      try {
        const r = await fetch(`${SLEEPER}${path}`,{signal:ctrl.signal});
        clearTimeout(t);
        if (!r.ok) throw new Error(`HTTP ${r.status} on ${path}`);
        return await r.json();
      } catch(e) { clearTimeout(t); throw e; }
    };

    // ─── SCORING SETTINGS (your league) ──────────────────────────────────────
    const SCORING = {
      pass_yd:0.04, pass_td:4, pass_int:-2,
      rush_yd:0.1,  rush_td:6,
      rec:0.5,      rec_yd:0.1, rec_td:4,
      def_sack:4,   def_tackle_solo:1, def_tackle_for_loss:2,
      def_pass_def:2, def_int:6, def_forced_fumble:3,
      def_fumble_rec:4, def_safe:8,
    };

    const calcSleeperPts = (s) => {
      if (!s) return 0;
      return (
        (s.pass_yd||0)*SCORING.pass_yd + (s.pass_td||0)*SCORING.pass_td + (s.pass_int||0)*SCORING.pass_int +
        (s.rush_yd||0)*SCORING.rush_yd + (s.rush_td||0)*SCORING.rush_td +
        (s.rec||0)*SCORING.rec + (s.rec_yd||0)*SCORING.rec_yd + (s.rec_td||0)*SCORING.rec_td +
        (s.def_sack||0)*SCORING.def_sack + (s.def_tackle_solo||0)*SCORING.def_tackle_solo +
        (s.def_tackle_for_loss||0)*SCORING.def_tackle_for_loss +
        (s.def_pass_def||0)*SCORING.def_pass_def + (s.def_int||0)*SCORING.def_int +
        (s.def_forced_fumble||0)*SCORING.def_forced_fumble +
        (s.def_fumble_rec||0)*SCORING.def_fumble_rec + (s.def_safe||0)*SCORING.def_safe
      );
    };

    // IDP scarcity based on actual season stat profile
    const idpScarcity = (pos, t) => {
      if (!t) return SCARCITY[pos]||1.0;
      const sacks   = t.def_sack||0;
      const tackles = t.def_tackle_solo||0;
      const ints    = t.def_int||0;
      if (pos==="DL") return sacks>=6 ? 1.6 : sacks>=3 ? 1.3 : 0.9;
      if (pos==="LB") return ints>=2  ? 1.3 : tackles>=80 ? 1.2 : 1.0;
      if (pos==="DB") return ints>=3  ? 1.25 : ints>=1 ? 1.1 : 0.9;
      return SCARCITY[pos]||1.0;
    };

    // ─── XLSX EXPORT ──────────────────────────────────────────────────────────
    const doExport = (players, newsMap) => {
      const wb = XLSX.utils.book_new();

      const bh = ["Rank","Player","Pos","Team","Age","Yrs Exp","Score","Tier","Depth","Role%",
                   "G Started","G Played","PPG","2025 Stats","Trades","FA Adds","Injury","Owner","Signal","Situation","News Note"];
      const bd = players.map((p,i) => {
        const n = newsMap[p.name]||{};
        return [i+1,p.name,p.pos,p.team,p.age??'',p.yrsExp??'',p.score,p.tier,
                p.depthOrder?`#${p.depthOrder}`:'—',Math.round(p.roleConf*100),
                p.gamesStarted??'',p.gamesPlayed??'',p.ppg??'',p.statLine||'',
                p.trades||0,p.adds||0,p.injStatus||'Active',p.owner,
                n.signal||'',n.situation||'',n.note||''];
      });
      const ws1 = XLSX.utils.aoa_to_sheet([bh,...bd]);
      ws1['!cols']=[{wch:5},{wch:22},{wch:5},{wch:6},{wch:5},{wch:7},{wch:7},{wch:9},{wch:7},{wch:6},
                    {wch:8},{wch:8},{wch:6},{wch:28},{wch:7},{wch:7},{wch:12},{wch:18},{wch:7},{wch:11},{wch:50}];
      XLSX.utils.book_append_sheet(wb,ws1,"Dynasty Board");

      const rows2=[["Pos","Rank","Player","Team","Age","Score","Tier","Depth","G Started","PPG","Stats","Owner","Signal"]];
      POS_ORDER.forEach(pos=>{
        players.filter(p=>p.pos===pos).forEach((p,i) => {
          const n=newsMap[p.name]||{};
          rows2.push([pos,i+1,p.name,p.team,p.age??'',p.score,p.tier,
                      p.depthOrder?`#${p.depthOrder}`:'—',p.gamesStarted??'',p.ppg??'',p.statLine||'',p.owner,n.signal||'']);
        });
        rows2.push([]);
      });
      const ws2=XLSX.utils.aoa_to_sheet(rows2);
      ws2['!cols']=[{wch:5},{wch:5},{wch:22},{wch:6},{wch:5},{wch:7},{wch:9},{wch:7},{wch:8},{wch:6},{wch:28},{wch:18},{wch:7}];
      XLSX.utils.book_append_sheet(wb,ws2,"By Position");

      if (Object.keys(newsMap).length>0) {
        const ih=["Player","Pos","Team","Owner","Score","Tier","Status","Signal","Situation","Note"];
        const id=Object.entries(newsMap).map(([name,n]) => {
          const p=players.find(pl=>pl.name===name);
          return [name,p?.pos||'',p?.team||'',p?.owner||'',p?.score||'',p?.tier||'',
                  n.status||'',n.signal||'',n.situation||'',n.note||''];
        });
        const ws3=XLSX.utils.aoa_to_sheet([ih,...id]);
        ws3['!cols']=[{wch:22},{wch:5},{wch:6},{wch:18},{wch:6},{wch:9},{wch:10},{wch:7},{wch:11},{wch:55}];
        XLSX.utils.book_append_sheet(wb,ws3,"Player Intel");
      }

      const ws4=XLSX.utils.aoa_to_sheet([
        ["MGG Dynasty — Value Snapshot"],[""],
        ["Generated",new Date().toLocaleString()],["League ID",LEAGUE_ID],
        ["Players",players.length],
        ["Intel scanned",Object.keys(newsMap).length>0?`${Object.keys(newsMap).length} players`:"Not run"],
        [""],["FORMULA"],
        ["Production × Scarcity","45% — Sleeper PPG × pos scarcity (IDP role-weighted)"],
        ["Age / Longevity","30% — pos-specific prime windows, gated by role + starts"],
        ["Market Demand","15% — trades×3 + FA adds − drops×0.5"],
        ["Role Stability","10% — depth chart order"],
        [""],["SCARCITY MULTIPLIERS"],
        ["QB","2.0×"],["RB","1.7×"],["TE","1.5×"],["WR","1.3×"],
        ["LB","1.0-1.3×"],["DL","0.9-1.6×"],["DB","0.9-1.25×"],["K","0.6×"],
      ]);
      ws4['!cols']=[{wch:26},{wch:50}];
      XLSX.utils.book_append_sheet(wb,ws4,"Snapshot Info");

      XLSX.writeFile(wb,`MGG_Dynasty_${new Date().toISOString().split("T")[0]}.xlsx`);
    };

    // ─── INTEL SCAN (rule-based: ESPN news + Sleeper injury/depth) ────────────
    const deriveSignal = (p, headlines) => {
      const inj = p.injStatus;
      const age = p.age||0;
      const [,peak,cliff] = ({"QB":[25,34,38],"RB":[23,27,30],"WR":[23,29,33],"TE":[24,31,35]}[p.pos]||[23,29,33]);

      let status = "Starter";
      if (inj==="IR"||inj==="PUP"||inj==="Out") status="Injured";
      else if (inj==="Doubtful")                 status="Uncertain";
      else if (inj==="Questionable")             status="Uncertain";
      else if (p.depthOrder>=2)                  status="Backup";
      else if (p.gamesStarted!=null&&p.gamesStarted<6&&p.pos==="QB") status="Backup";

      let situation = "Stable";
      if (age>cliff)                           situation="Declining";
      else if (age>peak)                       situation="Declining";
      else if (age<24&&p.depthOrder===1)       situation="Improving";
      else if (inj&&inj!=="Questionable")      situation="Unknown";

      let signal = "HOLD";
      if (status==="Injured"||inj==="IR"||inj==="PUP") signal="SELL";
      else if (status==="Backup"&&age>peak)    signal="SELL";
      else if (status==="Backup"&&p.pos==="QB") signal="WATCH";
      else if (inj==="Questionable"||inj==="Doubtful") signal="WATCH";
      else if (age<24&&p.depthOrder===1&&(p.yrsExp||0)<3) signal="BUY";
      else if (situation==="Declining"&&p.depthOrder!==1) signal="SELL";
      else if (situation==="Improving")        signal="BUY";

      const parts = [];
      if (inj) parts.push(`${inj} — ${inj==="IR"?"on IR":inj==="PUP"?"on PUP list":"injury listed"}`);
      if (p.depthOrder) parts.push(`Depth chart #${p.depthOrder}`);
      if (p.gamesStarted!=null) parts.push(`${p.gamesStarted}/${p.gamesPlayed} starts in 2025`);
      if (age>cliff) parts.push(`Age ${age} — past positional cliff (${cliff})`);
      else if (age>peak) parts.push(`Age ${age} — entering decline window`);
      else if (age<24) parts.push(`Age ${age} — prime development window`);
      if (p.trades>0) parts.push(`Traded ${p.trades}x this season`);

      const playerHeadline = headlines.find(h =>
        h.toLowerCase().includes((p.name.split(" ")[1]||"").toLowerCase()) &&
        h.toLowerCase().includes((p.team||"").toLowerCase())
      );
      if (playerHeadline) parts.push(playerHeadline.slice(0,80));

      return { status, situation, signal, note: parts.slice(0,2).join(" · ").slice(0,120) || `${p.pos} for ${p.team}` };
    };

    // ─── MAIN APP ─────────────────────────────────────────────────────────────
    function App() {
      const [phase,      setPhase]     = useState("idle");
      const [progress,   setProgress]  = useState([]);
      const [players,    setPlayers]   = useState([]);
      const [newsMap,    setNewsMap]   = useState({});
      const [newsPhase,  setNewsPhase] = useState("idle");
      const [tab,        setTab]       = useState("board");
      const [posFilter,  setPosFilter] = useState("ALL");
      const [tierFilter, setTierFilter]= useState("ALL");
      const [search,     setSearch]    = useState("");
      const [sortKey,    setSortKey]   = useState("score");
      const [sortAsc,    setSortAsc]   = useState(false);
      const [detail,     setDetail]    = useState(null);
      const [syncedAt,   setSyncedAt]  = useState(null);
      const logRef = useRef([]);

      // ── Trade Analyzer state ──────────────────────────────────────────────
      const [tradeOwnerA,   setTradeOwnerA]  = useState("PunterParty");
      const [tradeOwnerB,   setTradeOwnerB]  = useState("");
      const [tradeSideA,    setTradeSideA]   = useState([]); // {type:"player"|"pick", ...}
      const [tradeSideB,    setTradeSideB]   = useState([]);
      const [tradeSearchA,  setTradeSearchA] = useState("");
      const [tradeSearchB,  setTradeSearchB] = useState("");
      const [tradePickYrA,  setTradePickYrA] = useState(2026);
      const [tradePickRdA,  setTradePickRdA] = useState("1st");
      const [tradePickYrB,  setTradePickYrB] = useState(2026);
      const [tradePickRdB,  setTradePickRdB] = useState("1st");

      const owners = [...new Set(players.map(p=>p.owner).filter(Boolean))].sort();

      const rosterOf = (owner) => players.filter(p=>p.owner===owner)
        .sort((a,b)=>b.score-a.score);

      const tradeSearchResults = (owner, search) => {
        if (!search.trim()) return [];
        const s = search.toLowerCase();
        return rosterOf(owner).filter(p =>
          p.name.toLowerCase().includes(s) &&
          !tradeSideA.find(x=>x.pid===p.pid) &&
          !tradeSideB.find(x=>x.pid===p.pid)
        ).slice(0,6);
      };

      const addPlayer = (side, p) => {
        const setter = side==="A" ? setTradeSideA : setTradeSideB;
        setter(prev => [...prev, {type:"player", pid:p.pid, name:p.name,
          pos:p.pos, team:p.team, age:p.age, score:p.score, tier:p.tier, owner:p.owner}]);
        if (side==="A") setTradeSearchA(""); else setTradeSearchB("");
      };

      const addPick = (side) => {
        const yr  = side==="A" ? tradePickYrA : tradePickYrB;
        const rd  = side==="A" ? tradePickRdA : tradePickRdB;
        const val = pickValue(rd, yr - 2026);
        const setter = side==="A" ? setTradeSideA : setTradeSideB;
        setter(prev => [...prev, {type:"pick", id:`${yr}-${rd}-${Date.now()}`,
          label:`${yr} ${rd}`, year:yr, round:rd, score:val, customVal:null}]);
      };

      const removeItem = (side, id) => {
        const setter = side==="A" ? setTradeSideA : setTradeSideB;
        setter(prev => prev.filter(x=>(x.pid||x.id)!==id));
      };

      const setPickCustomVal = (side, id, val) => {
        const setter = side==="A" ? setTradeSideA : setTradeSideB;
        setter(prev => prev.map(x => (x.id===id ? {...x, customVal: val===''?null:Number(val)} : x)));
      };

      const itemScore = (item) => item.customVal ?? item.score ?? 0;

      const tradeTotal = (side) => (side==="A"?tradeSideA:tradeSideB)
        .reduce((s,x)=>s+itemScore(x),0);

      const tradeVerdict = () => {
        const diff = tradeTotal("B") - tradeTotal("A"); // positive = you gain
        const abs  = Math.abs(diff);
        if (abs <= 5)  return {label:"FAIR TRADE",    color:"#3b82f6", diff};
        if (abs <= 15) return {label: diff>0?"SLIGHT WIN":"SLIGHT LOSS", color:diff>0?"#22c55e":"#f59e0b", diff};
        if (abs <= 30) return {label: diff>0?"CLEAR WIN":"CLEAR LOSS",   color:diff>0?"#22c55e":"#ef4444", diff};
        return           {label: diff>0?"STRONG WIN":"LOPSIDED LOSS",    color:diff>0?"#22c55e":"#ef4444", diff};
      };

      const tradeReset = () => {
        setTradeSideA([]); setTradeSideB([]);
        setTradeSearchA(""); setTradeSearchB("");
        setTradeOwnerB("");
      };

      // ── Manual Situations state — seeded from defaults, persisted in localStorage
      const loadSituations = () => {
        try {
          const stored = localStorage.getItem("mgg_situations");
          if (stored) return JSON.parse(stored);
        } catch {}
        return { ...MANUAL_SITUATIONS }; // first run: seed from hardcoded defaults
      };
      const [manualSits,    setManualSits]    = useState(loadSituations);
      const [sitEditName,   setSitEditName]   = useState("");
      const [sitEditFlag,   setSitEditFlag]   = useState("NEW_OC");
      const [sitEditNote,   setSitEditNote]   = useState("");
      const [sitEditGames,  setSitEditGames]  = useState("");
      const [sitEditing,    setSitEditing]    = useState(null); // name being edited
      const manualSitsRef = useRef(manualSits);
      manualSitsRef.current = manualSits;

      const saveSituations = (next) => {
        setManualSits(next);
        try { localStorage.setItem("mgg_situations", JSON.stringify(next)); } catch {}
      };

      const sitAdd = () => {
        if (!sitEditName.trim()) return;
        const next = { ...manualSitsRef.current,
          [sitEditName.trim()]: { flag: sitEditFlag, note: sitEditNote.trim(),
            ...(sitEditFlag==="SUSPENSION"&&sitEditGames?{games:parseInt(sitEditGames)}:{}) }};
        saveSituations(next);
        setSitEditName(""); setSitEditNote(""); setSitEditGames(""); setSitEditing(null);
      };

      const sitRemove = (name) => {
        const next = { ...manualSitsRef.current };
        delete next[name];
        saveSituations(next);
      };

      const sitStartEdit = (name) => {
        const s = manualSitsRef.current[name];
        setSitEditing(name); setSitEditName(name);
        setSitEditFlag(s.flag); setSitEditNote(s.note||"");
        setSitEditGames(s.games?String(s.games):"");
      };

      const sitResetDefaults = () => {
        if (window.confirm("Reset to hardcoded defaults? Your custom entries will be lost.")) {
          saveSituations({ ...MANUAL_SITUATIONS });
          setSitEditing(null);
        }
      };

      // ── Watchlist (deep situational research via Claude) ──────────────────
      const [watchlist,     setWatchlist]    = useState(() => {
        try { return JSON.parse(localStorage.getItem("mgg_watchlist")||"[]"); } catch { return []; }
      });
      const [watchInput,    setWatchInput]   = useState("");
      const [researchResults, setResearchResults] = useState({}); // name -> {flag,note,signal,reasoning,status}
      const [researchRunning, setResearchRunning] = useState(false);

      const saveWatchlist = (next) => {
        setWatchlist(next);
        try { localStorage.setItem("mgg_watchlist", JSON.stringify(next)); } catch {}
      };

      const watchAdd = () => {
        const name = watchInput.trim();
        if (!name || watchlist.includes(name)) return;
        saveWatchlist([...watchlist, name]);
        setWatchInput("");
      };

      const watchRemove = (name) => {
        saveWatchlist(watchlist.filter(n=>n!==name));
        setResearchResults(r => { const n={...r}; delete n[name]; return n; });
      };

      const approveResult = (name) => {
        const r = researchResults[name];
        if (!r) return;
        const next = { ...manualSitsRef.current,
          [name]: { flag: r.flag, note: r.note,
            ...(r.flag==="SUSPENSION"&&r.games?{games:r.games}:{}) }};
        saveSituations(next);
        setResearchResults(prev => ({...prev, [name]: {...prev[name], approved:true}}));
      };

      const rejectResult = (name) => {
        setResearchResults(prev => { const n={...prev}; delete n[name]; return n; });
      };

      // ── DEEP ANALYSE — roster data first, headlines as secondary ────────────
      // Priority 1: Sleeper roster fields (already synced, always accurate)
      // Priority 2: ESPN headline keywords (supplementary context only)

      const HEADLINE_RULES = [
        { flag:"SUSPENSION",     terms:["suspend","disciplin","violated","banned","personal conduct","commissioner"] },
        { flag:"TRADE_DEMAND",   terms:["trade request","requested trade","wants out","demands trade","holdout","hold out"] },
        { flag:"FREE_AGENT",     terms:["released","cut by","waived","free agent","unsigned","let go"] },
        { flag:"CAMP_BATTLE",    terms:["competition","camp battle","depth chart battle","competing for starting","position battle"] },
        { flag:"DEPTH_PROMOTED", terms:["named starter","takes over as starter","steps in at","starting in place","promoted to starter"] },
        { flag:"BREAKOUT_ROLE",  terms:["lead back","featured back","bell cow","every down back","expanded role","target share increase"] },
        { flag:"NEW_OC",         terms:["traded to","trade to","acquired by","sent to","new team","offensive coordinator","new oc","scheme change"] },
        { flag:"CONTRACT_YEAR",  terms:["contract year","final year of","extension talks","playing for his next","upcoming free agent"] },
      ];

      const SIG_MAP = {
        SUSPENSION:"WATCH", TRADE_DEMAND:"SELL", FREE_AGENT:"WATCH",
        IR_RETURN:"WATCH",  CAMP_BATTLE:"WATCH", DEPTH_PROMOTED:"BUY",
        BREAKOUT_ROLE:"BUY",BREAKOUT_YOUNG:"BUY",NEW_OC:"HOLD", CONTRACT_YEAR:"HOLD",
        AGE_CLIFF:"WATCH",
      };

      const deepAnalyse = (name, headlines, p) => {
        const sources = [];

        // ── LAYER 1: Sleeper roster data (authoritative) ──────────────────────
        if (p) {
          // Free agent / released — team is FA or status is Cut/Inactive
          if (p.team === "FA" || ["Cut","Inactive","Released"].includes(p.status)) {
            return {
              flag:"FREE_AGENT",
              note:`${name} is a free agent — no team, role, or scheme confirmed`,
              signal:"WATCH",
              reasoning:`Sleeper shows team="${p.team||"FA"}", status="${p.status||"unknown"}". Landing spot unknown.`,
              status:"done", approved:false
            };
          }

          // On IR or PUP — but was rostered, so this is a return situation
          if (["IR","PUP"].includes(p.injStatus)) {
            return {
              flag:"IR_RETURN",
              note:`${name} on ${p.injStatus} — timeline and return workload uncertain`,
              signal:"WATCH",
              reasoning:`Sleeper injury status: ${p.injStatus}. Production risk until cleared and role confirmed.`,
              status:"done", approved:false
            };
          }

          // Dynasty trade OR NFL team change — either way, new situation
          // nflTeamChanged is true if player has a team but their Sleeper team differs
          // from what their depth chart suggests (captured via adds with team set)
          const tradeSignal = p.trades >= 1 || (p.adds >= 1 && p.team && p.team !== "FA");
          if (p.trades >= 1) {
            sources.push({ flag:"NEW_OC", confidence: p.trades * 3,
              reason:`Dynasty traded ${p.trades}x — new team, new scheme, role unknown` });
          }

          // High add volume with no trade — waiver pickup / emerging role
          if (p.trades === 0 && p.adds >= 3 && p.depthOrder === 1 && p.yrsExp <= 3) {
            const flag = resolveBreakoutFlag("BREAKOUT_ROLE", p.age);
            sources.push({ flag, confidence: p.adds,
              reason:`Depth #1, ${p.adds} FA adds, ${p.yrsExp} yrs exp — emerging starter` });
          }

          // Backup with zero production — camp battle risk
          if (p.depthOrder >= 2 && (p.ppg === 0 || p.ppg == null) && p.gamesStarted === 0) {
            sources.push({ flag:"CAMP_BATTLE", confidence: 1,
              reason:`Depth #${p.depthOrder} with no starts recorded — role competition likely` });
          }
        }

        // ── LAYER 2: ESPN headline scan (supplementary) ───────────────────────
        // Normalize name — strip punctuation so "D.J." matches "DJ", "A.J." matches "AJ" etc.
        const normName  = name.toLowerCase().replace(/[^a-z0-9 ]/g, "").trim();
        const normParts = normName.split(" ").filter(Boolean);
        const lastName  = normParts[normParts.length - 1];
        const firstName = normParts[0];

        const relevant = headlines.filter(h => {
          const hl = h.toLowerCase().replace(/[^a-z0-9 ]/g, "");
          // Match last name AND first 2 chars of first name (handles DJ vs D.J., AJ vs A.J.)
          return hl.includes(lastName) && hl.includes(firstName.slice(0,2));
        });
        const text = relevant.join(" ").toLowerCase().replace(/[^a-z0-9 ]/g, "");

        if (text) {
          HEADLINE_RULES.forEach(({ flag, terms }) => {
            // Normalize terms too so punctuation doesn't break matching
            const normTerms = terms.map(t => t.toLowerCase().replace(/[^a-z0-9 ]/g, ""));
            const hits = normTerms.filter(t => text.includes(t)).length;
            if (hits > 0) sources.push({ flag, confidence: hits,
              reason: `Headline: "${terms.filter((t,i) => text.includes(normTerms[i]))[0]}"` });
          });
        }

        // ── Pick highest-confidence source ────────────────────────────────────
        if (!sources.length) return null;
        sources.sort((a,b) => b.confidence - a.confidence);
        const top = sources[0];
        const resolvedFlag = resolveBreakoutFlag(top.flag, p?.age);

        // Pull best matching headline as note if available
        const rule = HEADLINE_RULES.find(r=>r.flag===top.flag);
        const noteSrc = relevant.find(h => rule?.terms.some(t=>h.toLowerCase().includes(t))) || relevant[0];
        const note = noteSrc
          ? (noteSrc.length > 100 ? noteSrc.slice(0,97)+"..." : noteSrc)
          : top.reason;

        return {
          flag: resolvedFlag,
          note,
          signal: SIG_MAP[resolvedFlag] || "HOLD",
          reasoning: top.reason + (sources.length > 1 ? ` · ${sources.length-1} other signal(s) also detected.` : ""),
          status:"done", approved:false
        };
      };

      const runWatchlistResearch = async () => {
        if (!watchlist.length) { alert("Add players to the watchlist first."); return; }
        setResearchRunning(true);

        const rosterLookup = {};
        players.forEach(p => { rosterLookup[p.name] = p; });

        // Mark all as loading
        const loading = {};
        watchlist.forEach(name => { loading[name] = {status:"loading"}; });
        setResearchResults(loading);

        // Single fetch of the known-working ESPN NFL news endpoint (same one Intel Scan uses)
        // Pull a large batch so player-specific articles are likely included
        let allArticles = [];
        try {
          const r = await fetch(
            "https://site.api.espn.com/apis/site/v2/sports/football/nfl/news?limit=200",
            {signal:AbortSignal.timeout(10000)}
          );
          if (r.ok) {
            const d = await r.json();
            // Extract headline + description from each article for richer text
            allArticles = (d.articles||[]).map(a =>
              [a.headline, a.description].filter(Boolean).join(". ")
            );
          }
        } catch(e) {
          // If even this fails, report error on all
          const errs = {};
          watchlist.forEach(name => { errs[name] = {status:"error", error:"ESPN news fetch failed: "+e.message}; });
          setResearchResults(errs);
          setResearchRunning(false);
          return;
        }

        // Also pull Sleeper trending for signal boost
        let trending = [];
        try {
          const r = await fetch("https://api.sleeper.app/v1/players/nfl/trending/add?lookback_hours=168&limit=100",
            {signal:AbortSignal.timeout(6000)});
          if (r.ok) { const d = await r.json(); trending = d.map(t=>t.player_id||t); }
        } catch {}

        // Run deep analysis per player against the shared article pool
        const results = {};
        for (const name of watchlist) {
          const p = rosterLookup[name];
          const result = deepAnalyse(name, allArticles, p);
          const isTrending = p && trending.includes(p.pid);

          if (result) {
            // Trending + BUY → extra conviction
            if (isTrending && result.signal==="BUY") result.reasoning += " Also trending on Sleeper adds.";
            results[name] = result;
          } else {
            results[name] = {
              flag: null,
              note: `No notable situation found in ${allArticles.length} recent articles`,
              signal: isTrending ? "WATCH" : "HOLD",
              reasoning: isTrending
                ? "No news flags detected but player is trending on Sleeper adds this week."
                : `No situation keywords matched across ${allArticles.length} articles. Player appears stable.`,
              status:"done", approved:false
            };
          }
        }
        setResearchResults(results);
        setResearchRunning(false);
      };

      const log = (msg, type="info") => {
        const entry = {msg, type, ts: new Date().toLocaleTimeString()};
        logRef.current = [...logRef.current, entry];
        setProgress([...logRef.current]);
      };

      // ── LOAD DATA ───────────────────────────────────────────────────────────
      const loadData = useCallback(async () => {
        setPhase("loading"); logRef.current=[]; setProgress([]);
        try {
          log("Connecting to Sleeper API...");
          const lg = await sf(`/league/${LEAGUE_ID}`);
          log(`League: "${lg.name||LEAGUE_ID}" · Season ${lg.season}`, "success");

          log("Loading owners...");
          const users = await sf(`/league/${LEAGUE_ID}/users`);
          const userMap = {};
          users.forEach(u => { userMap[u.user_id] = u.metadata?.team_name||u.display_name||u.username; });
          log(`${users.length} owners loaded`, "success");

          log("Loading rosters...");
          const rosters = await sf(`/league/${LEAGUE_ID}/rosters`);
          const ownerMap={}, taxiMap={};
          rosters.forEach(r => {
            const name = userMap[r.owner_id]||r.owner_id;
            (r.players||[]).forEach(pid => { ownerMap[pid]=name; });
            (r.taxi||[]).forEach(pid   => { taxiMap[pid]=true;  });
          });
          log(`${Object.keys(ownerMap).length} rostered players`, "success");

          log("Downloading NFL player database...");
          const allP = await sf(`/players/nfl`);
          log(`${Object.keys(allP).length} players in database`, "success");

          log("Parsing transactions (18 weeks)...");
          const tradeCnt={}, faAdd={}, dropCnt={};
          for (let wk=1; wk<=18; wk++) {
            try {
              const txs = await sf(`/league/${LEAGUE_ID}/transactions/${wk}`);
              if (!Array.isArray(txs)) continue;
              txs.forEach(tx => {
                if (tx.type==="trade")
                  Object.keys(tx.adds||{}).forEach(pid => { tradeCnt[pid]=(tradeCnt[pid]||0)+1; });
                if (["free_agent","waiver"].includes(tx.type)) {
                  Object.keys(tx.adds||{}).forEach(pid  => { faAdd[pid]=(faAdd[pid]||0)+1; });
                  Object.keys(tx.drops||{}).forEach(pid => { dropCnt[pid]=(dropCnt[pid]||0)+1; });
                }
              });
            } catch {}
          }
          log(`Transactions done · ${Object.keys(tradeCnt).length} traded`, "success");

          // Build player profiles
          log("Building player profiles...");
          let pl = Object.keys(ownerMap).map(pid => {
            const p = allP[pid];
            if (!p||!SCARCITY[p.position]) return null;
            const depthOrder = p.depth_chart_order||null;
            const roleConf   = depthOrder===1?1.0:depthOrder===2?0.55:depthOrder>=3?0.25:0.65;
            return {
              pid, pos:p.position,
              name:p.full_name||`${p.first_name} ${p.last_name}`,
              age:calcAge(p.birth_date),
              team:p.team||"FA", owner:ownerMap[pid], onTaxi:taxiMap[pid]||false,
              injStatus:p.injury_status||null, depthOrder, depthPos:p.depth_chart_position||"",
              roleConf, yrsExp:p.years_exp, height:p.height, weight:p.weight, status:p.status,
              trades:tradeCnt[pid]||0, adds:faAdd[pid]||0, drops:dropCnt[pid]||0,
              gamesStarted:null, gamesPlayed:null, ppg:null, statLine:null, seasonTotals:null,
            };
          }).filter(Boolean);

          // ── Sleeper Season Stats (18 bulk calls) ────────────────────────────
          log("Fetching Sleeper season stats (18 weeks)...");
          const sleeperTotals = {};
          const STAT_FIELDS = [
            "pass_yd","pass_td","pass_int",
            "rush_yd","rush_td","rush_att",
            "rec","rec_yd","rec_td","rec_tgt",
            "def_sack","def_tackle_solo","def_tackle_for_loss",
            "def_pass_def","def_int","def_forced_fumble","def_fumble_rec",
          ];

          for (let wk=1; wk<=18; wk++) {
            try {
              const r = await fetch(
                `https://api.sleeper.app/v1/stats/nfl/regular/2025/${wk}`,
                {signal: AbortSignal.timeout(10000)}
              );
              if (!r.ok) continue;
              const weekStats = await r.json();
              Object.entries(weekStats).forEach(([pid, s]) => {
                if (!s) return;
                const hasActivity = Object.values(s).some(v => v>0);
                if (!hasActivity) return;
                if (!sleeperTotals[pid]) sleeperTotals[pid] = {pts:0, gs:0, gp:0};
                const t = sleeperTotals[pid];
                t.pts += calcSleeperPts(s);
                t.gp  += 1;
                t.gs  += (s.gs||s.gms_active||0);
                STAT_FIELDS.forEach(f => { t[f] = (t[f]||0) + (s[f]||0); });
              });
            } catch(e) { console.warn(`Week ${wk} stats failed:`, e.message); }
            if (wk%6===0) log(`Sleeper stats: ${wk}/18 weeks aggregated...`);
          }
          log(`Sleeper stats complete · ${Object.keys(sleeperTotals).length} players with data`, "success");

          // Apply stats to rostered players
          let hits = 0;
          pl.forEach(p => {
            const t = sleeperTotals[p.pid];
            if (!t||t.gp===0) return;
            p.gamesPlayed  = t.gp;
            p.gamesStarted = t.gs;
            p.ppg          = +(t.pts/t.gp).toFixed(1);
            p.seasonTotals = t;
            hits++;
            if (p.pos==="QB")
              p.statLine = `${Math.round(t.pass_yd||0)}yds ${t.pass_td||0}td ${t.pass_int||0}int`;
            else if (p.pos==="RB")
              p.statLine = `${Math.round(t.rush_yd||0)}ru ${t.rush_td||0}td · ${t.rec||0}rec ${Math.round(t.rec_yd||0)}yds`;
            else if (["WR","TE"].includes(p.pos))
              p.statLine = `${t.rec||0}rec ${Math.round(t.rec_yd||0)}yds ${t.rec_td||0}td · ${t.rec_tgt||0}tgt`;
            else if (["DL","LB","DB"].includes(p.pos))
              p.statLine = `${t.def_tackle_solo||0}tkl ${t.def_sack||0}sck ${t.def_int||0}int ${t.def_pass_def||0}pd`;
          });
          log(`Stats applied to ${hits}/${pl.length} rostered players`, hits>0?"success":"info");

          // ── Dynasty Scores ───────────────────────────────────────────────────
          pl.forEach(p => {
            p.ageRaw = ageScore(p.age, p.pos);
            const espnRate = (p.gamesStarted!=null&&p.gamesPlayed>0) ? p.gamesStarted/p.gamesPlayed : null;
            p.effRole = espnRate!=null ? p.roleConf*0.35+espnRate*0.65 : p.roleConf;

            // Start penalty — missing data defaults to uncertainty, not full credit
            let startPenalty = 1.0;
            if (p.pos==="QB") {
              if (p.gamesStarted!=null) {
                if      (p.gamesStarted<5)  startPenalty=0.30;
                else if (p.gamesStarted<9)  startPenalty=0.55;
                else if (p.gamesStarted<13) startPenalty=0.78;
              } else {
                startPenalty = p.depthOrder===1 ? 0.72 : 0.45;
              }
            } else if (p.gamesStarted!=null&&p.gamesStarted<4) {
              startPenalty = 0.50;
            } else if (p.gamesStarted===null&&["RB","WR","TE"].includes(p.pos)&&p.depthOrder>1) {
              startPenalty = 0.65;
            }

            p.ageGated = p.ageRaw * Math.min(p.effRole,1.0) * startPenalty;

            const sc = ["DL","LB","DB"].includes(p.pos)
              ? idpScarcity(p.pos, p.seasonTotals)
              : SCARCITY[p.pos]||1.0;
            p.scarcityUsed = sc;

            const baseProd = p.ppg!=null
              ? p.ppg * sc
              : sc * p.effRole * startPenalty * 10;

            // ── Apply MANUAL_SITUATIONS first (runs every sync, no Intel needed) ──
            const manualSit = manualSitsRef.current[p.name];
            if (manualSit) {
              p.situationFlag  = resolveBreakoutFlag(manualSit.flag, p.age);
              p.situationNote  = manualSit.note;
              p.situationGames = manualSit.games||null;
            } else if (!p.situationFlag) {
              p.situationFlag  = null;
              p.situationNote  = null;
              p.situationGames = null;
            }

            // Auto-set AGE_CLIFF if past positional cliff and no other flag
            if (!p.situationFlag) {
              const [,, cliff] = PRIME[p.pos]||[23,29,33];
              if ((p.age||0) > cliff) {
                p.situationFlag = "AGE_CLIFF";
                p.situationNote = `Age ${p.age} — past ${p.pos} cliff (${cliff})`;
              }
            }
            // Upgrade BREAKOUT_ROLE to BREAKOUT_YOUNG for players ≤23
            if (p.situationFlag === "BREAKOUT_ROLE" && (p.age||99) <= 23) {
              p.situationFlag = "BREAKOUT_YOUNG";
            }
            p.prodProxy = baseProd * sitMultiplier(p);

            p.demandRaw = p.trades*3 + p.adds - p.drops*0.5;
            p.roleStab  = p.depthOrder ? Math.max(0,100-(p.depthOrder-1)*30) : 55;
          });

          pl = normalise(pl,"prodProxy");
          pl = normalise(pl,"ageGated");
          pl = normalise(pl,"demandRaw");
          pl = normalise(pl,"roleStab");
          pl.forEach(p => {
            p.score = Math.round(Math.min(100,Math.max(0,
              p.prodProxy_n*0.45 + p.ageGated_n*0.30 + p.demandRaw_n*0.15 + p.roleStab_n*0.10)));
          });

          const srt = [...pl].sort((a,b)=>b.score-a.score);
          const n   = srt.length;
          const [t90,t70,t45,t20] = [0.10,0.30,0.55,0.80].map(q=>srt[Math.floor(n*q)]?.score||50);
          pl.forEach(p => {
            p.tier = p.score>=t90?"Elite":p.score>=t70?"Starter":p.score>=t45?"Flex":p.score>=t20?"Depth":"Stash";
          });

          const tc = ["Elite","Starter","Flex","Depth","Stash"].map(t=>`${t}:${pl.filter(x=>x.tier===t).length}`).join(" · ");
          log(`Scores complete · ${tc}`, "success");
          log("Ready — use ◈ INTEL SCAN for news, ⬇ EXPORT XLSX for snapshot", "done");

          setPlayers(pl.sort((a,b)=>b.score-a.score));
          setSyncedAt(new Date().toLocaleTimeString());
          setPhase("done");
        } catch(e) {
          log(`Error: ${e.message}`, "error");
          setPhase("error");
        }
      },[]);

      // ── INTEL SCAN ──────────────────────────────────────────────────────────
      const runIntel = useCallback(async () => {
        setNewsPhase("loading");
        try {
          let headlines = [];
          try {
            const r = await fetch(
              "https://site.api.espn.com/apis/site/v2/sports/football/nfl/news?limit=100",
              {signal:AbortSignal.timeout(6000)}
            );
            if (r.ok) {
              const d = await r.json();
              headlines = (d.articles||[]).map(a=>a.headline||a.title||"").filter(Boolean);
            }
          } catch {}

          let trending = [];
          try {
            const r = await fetch(
              "https://api.sleeper.app/v1/players/nfl/trending/add?lookback_hours=48&limit=50",
              {signal:AbortSignal.timeout(6000)}
            );
            if (r.ok) {
              const d = await r.json();
              trending = d.map(t=>t.player_id||t);
            }
          } catch {}

          // Auto-detect situations from news for players without a manual flag
          // (manual flags already applied during sync — this only fills gaps)
          const enrichedPlayers = players.map(p => {
            if (p.situationFlag) return p; // manual flag wins, don't override
            const autoFlag = detectSituation(p.name, headlines);
            if (autoFlag) {
              const resolved = resolveBreakoutFlag(autoFlag, p.age);
              return { ...p, situationFlag: resolved, situationNote: "Auto-detected from news", situationGames: null };
            }
            return p;
          });

          const result = {};
          enrichedPlayers.filter(p=>["QB","RB","WR","TE"].includes(p.pos)).forEach(p => {
            const intel = deriveSignal(p, headlines);
            if (trending.includes(p.pid)&&intel.signal==="HOLD") intel.signal="WATCH";
            // Adjust signal based on situation flag
            if ((p.situationFlag==="BREAKOUT_YOUNG"||p.situationFlag==="BREAKOUT_ROLE") && intel.signal==="HOLD") intel.signal="BUY";
            if (p.situationFlag==="DEPTH_PROMOTED" && intel.signal==="HOLD") intel.signal="BUY";
            if (p.situationFlag==="CAMP_BATTLE"    && intel.signal==="HOLD") intel.signal="WATCH";
            if (p.situationFlag==="IR_RETURN"      && intel.signal==="HOLD") intel.signal="WATCH";
            if (p.situationFlag==="TRADE_DEMAND")                            intel.signal="SELL";
            if (p.situationFlag==="SUSPENSION")                              intel.signal="WATCH";
            if (p.situationFlag==="AGE_CLIFF" && intel.signal==="HOLD")     intel.signal="WATCH";
            if (p.situationFlag==="FREE_AGENT")                              intel.signal="WATCH";
            result[p.name] = { ...intel, situationFlag: p.situationFlag, situationNote: p.situationNote };
          });

          setPlayers(enrichedPlayers);
          setNewsMap(result);
          setNewsPhase("done");
        } catch(e) {

                            <option value="">— Select owner —</option>
                            {owners.map(o=><option key={o} value={o}>{o}</option>)}
                          </select>

                          {/* Player search */}
                          {owner&&(
                            <div style={{position:"relative",marginBottom:8}}>
                              <input value={search} onChange={e=>setSearch(e.target.value)}
                                placeholder="Search player..."
                                style={{width:"100%",boxSizing:"border-box",background:"#080d14",
                                  border:"1px solid #1e2d3d",color:"#e2e8f0",padding:"6px 10px",
                                  borderRadius:5,fontFamily:"inherit",fontSize:10}}/>
                              {tradeSearchResults(owner,search).length>0&&(
                                <div style={{position:"absolute",top:"100%",left:0,right:0,
                                  background:"#0f1923",border:"1px solid #1e2d3d",borderRadius:5,
                                  zIndex:100,maxHeight:180,overflowY:"auto"}}>
                                  {tradeSearchResults(owner,search).map(p=>{
                                    const ts=TIER_STYLE[p.tier];
                                    return(
                                      <div key={p.pid} onClick={()=>addPlayer(side,p)}
                                        style={{padding:"7px 10px",cursor:"pointer",borderBottom:"1px solid #0f1923",
                                          display:"flex",justifyContent:"space-between",alignItems:"center"}}
                                        onMouseOver={e=>e.currentTarget.style.background="#1e2d3d"}
                                        onMouseOut={e=>e.currentTarget.style.background="transparent"}>
                                        <div>
                                          <span style={{fontSize:11,color:ts.text,fontWeight:700}}>{p.name}</span>
                                          <span style={{fontSize:9,color:"#4b6580",marginLeft:6}}>{p.pos} · {p.team} · {p.age}y</span>
                                        </div>
                                        <span style={{fontSize:11,fontWeight:900,color:ts.text}}>{p.score}</span>
                                      </div>
                                    );
                                  })}
                                </div>
                              )}
                            </div>
                          )}

                          {/* Pick adder */}
                          <div style={{display:"flex",gap:5,marginBottom:10,alignItems:"center"}}>
                            <select value={pickYr} onChange={e=>setPickYr(Number(e.target.value))}
                              style={{background:"#080d14",border:"1px solid #1e2d3d",color:"#e2e8f0",
                                padding:"5px 5px",borderRadius:4,fontFamily:"inherit",fontSize:9,flex:1}}>
                              {PICK_YEARS.map(y=><option key={y} value={y}>{y}</option>)}
                            </select>
                            <select value={pickRd} onChange={e=>setPickRd(e.target.value)}
                              style={{background:"#080d14",border:"1px solid #1e2d3d",color:"#e2e8f0",
                                padding:"5px 5px",borderRadius:4,fontFamily:"inherit",fontSize:9,flex:1}}>
                              {PICK_ROUNDS.map(r=><option key={r} value={r}>{r}</option>)}
                            </select>
                            <button onClick={()=>addPick(side)}
                              style={{background:"#1e2d3d",color:"#94a3b8",border:"1px solid #374151",
                                borderRadius:4,padding:"5px 8px",fontFamily:"inherit",fontSize:9,
                                cursor:"pointer",whiteSpace:"nowrap"}}>
                              + PICK
                            </button>
                          </div>

                          {/* Items list */}
                          <div style={{display:"flex",flexDirection:"column",gap:5,minHeight:60}}>
                            {items.length===0&&(
                              <div style={{fontSize:10,color:"#2a3d52",padding:"10px 0",textAlign:"center"}}>
                                Add players or picks above
                              </div>
                            )}
                            {items.map(item=>{
                              const ts = item.type==="player"?TIER_STYLE[item.tier]:TIER_STYLE.Stash;
                              return(
                                <div key={item.pid||item.id}
                                  style={{background:ts.bg,border:`1px solid ${ts.border}`,borderRadius:6,
                                    padding:"7px 10px",display:"flex",alignItems:"center",gap:8}}>
                                  <div style={{flex:1}}>
                                    {item.type==="player"&&(
                                      <>
                                        <div style={{fontSize:11,fontWeight:700,color:ts.text}}>{item.name}</div>
                                        <div style={{fontSize:9,color:"#4b6580"}}>{item.pos} · {item.team} · {item.age}y</div>
                                      </>
                                    )}
                                    {item.type==="pick"&&(
                                      <div style={{fontSize:11,fontWeight:700,color:"#94a3b8"}}>📋 {item.label}</div>
                                    )}
                                  </div>
                                  {/* Score / custom value */}
                                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                                    {item.type==="pick"&&(
                                      <input type="number" min="0" max="150"
                                        value={item.customVal??""} placeholder={item.score}
                                        onChange={e=>setPickCustomVal(side,item.id,e.target.value)}
                                        style={{width:42,background:"#080d14",border:"1px solid #1e2d3d",
                                          color:"#f59e0b",padding:"3px 5px",borderRadius:3,
                                          fontFamily:"inherit",fontSize:10,textAlign:"center"}}/>
                                    )}
                                    <span style={{fontSize:13,fontWeight:900,color:ts.text,minWidth:28,textAlign:"right"}}>
                                      {itemScore(item).toFixed(0)}
                                    </span>
                                    <button onClick={()=>removeItem(side,item.pid||item.id)}
                                      style={{background:"none",border:"none",color:"#4b6580",
                                        fontSize:14,cursor:"pointer",padding:"0 2px",lineHeight:1}}>
                                      ✕
                                    </button>
                                  </div>
                                </div>
                              );
                            })}
                          </div>

                        </div>
                      ))}
                    </div>

                    {/* Position impact summary */}
                    {(tradeSideA.some(x=>x.type==="player")||tradeSideB.some(x=>x.type==="player"))&&(
                      <div style={{marginTop:14,background:"#0a1118",border:"1px solid #1e2d3d",borderRadius:8,padding:"12px 16px"}}>
                        <div style={{fontSize:9,color:"#4b6580",letterSpacing:1.5,marginBottom:8,fontWeight:700}}>POSITION IMPACT</div>
                        <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                          {POS_ORDER.filter(pos=>[
                            ...tradeSideA.filter(x=>x.type==="player"),
                            ...tradeSideB.filter(x=>x.type==="player")
                          ].some(x=>x.pos===pos)).map(pos=>{
                            const giving = tradeSideA.filter(x=>x.type==="player"&&x.pos===pos);
                            const getting = tradeSideB.filter(x=>x.type==="player"&&x.pos===pos);
                            const netVal = getting.reduce((s,x)=>s+x.score,0) - giving.reduce((s,x)=>s+x.score,0);
                            return(
                              <div key={pos} style={{textAlign:"center",minWidth:48}}>
                                <div style={{fontSize:9,color:"#60a5fa",fontWeight:700,marginBottom:3}}>{pos}</div>
                                {giving.length>0&&<div style={{fontSize:9,color:"#ef4444"}}>-{giving.map(x=>x.score).join(", ")}</div>}
                                {getting.length>0&&<div style={{fontSize:9,color:"#22c55e"}}>+{getting.map(x=>x.score).join(", ")}</div>}
                                <div style={{fontSize:10,fontWeight:700,color:netVal>=0?"#22c55e":"#ef4444",marginTop:2,borderTop:"1px solid #1e2d3d",paddingTop:2}}>
                                  {netVal>=0?"+":""}{netVal}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </>
                )}
              </div>
            )}

            {tab==="roster"&&(
              <div>
                {phase!=="done"&&(
                  <div style={{textAlign:"center",padding:56,border:"1px dashed #1e2d3d",borderRadius:12}}>
                    <div style={{fontSize:11,color:"#4b6580",letterSpacing:2}}>SYNC DATA FIRST TO GRADE ROSTERS</div>
                  </div>
                )}
                {phase==="done"&&(()=>{
                  // ── Build per-owner grades ────────────────────────────────
                  const ownerGrades = owners.map(owner => {
                    const roster = players.filter(p=>p.owner===owner);
                    if (!roster.length) return null;

                    const scores     = roster.map(p=>p.score);
                    const avgScore   = scores.reduce((a,b)=>a+b,0)/scores.length;
                    const topScore   = Math.max(...scores);
                    const eliteCount = roster.filter(p=>p.tier==="Elite").length;
                    const starterCnt = roster.filter(p=>p.tier==="Starter").length;
                    const ages       = roster.map(p=>p.age).filter(Boolean);
                    const avgAge     = ages.length ? ages.reduce((a,b)=>a+b,0)/ages.length : 0;
                    const cliffCnt   = roster.filter(p=>p.situationFlag==="AGE_CLIFF").length;
                    const injCnt     = roster.filter(p=>["Out","IR","PUP"].includes(p.injStatus)).length;

                    // Position depth scores
                    const posDep = {};
                    POS_ORDER.forEach(pos => {
                      const pp = roster.filter(p=>p.pos===pos).sort((a,b)=>b.score-a.score);
                      posDep[pos] = { count:pp.length, top:pp[0]?.score||0, avg: pp.length ? pp.reduce((s,p)=>s+p.score,0)/pp.length : 0 };
                    });

                    // Contender score — weighted toward elite/starter depth and peak
                    const contenderScore = Math.round(
                      topScore * 0.25 +
                      avgScore * 0.30 +
                      eliteCount * 6 +
                      starterCnt * 2 +
                      Math.max(0, 35 - avgAge) * 1.2  // younger = more future value
                    );

                    // Window classification
                    const window = avgAge < 25   ? "REBUILD"
                                 : avgAge < 27.5 ? "RISING"
                                 : avgAge < 29.5 ? "CONTEND"
                                 : avgAge < 31   ? "WIN NOW"
                                 :                 "DECLINING";

                    const windowColor = {
                      REBUILD:"#60a5fa", RISING:"#22c55e",
                      CONTEND:"#f59e0b", "WIN NOW":"#ef4444", DECLINING:"#6b7280"
                    }[window];

                    // Letter grade
                    const grade = contenderScore >= 110 ? "A+"
                                : contenderScore >= 95  ? "A"
                                : contenderScore >= 80  ? "B+"
                                : contenderScore >= 65  ? "B"
                                : contenderScore >= 50  ? "C+"
                                : contenderScore >= 35  ? "C"
                                : "D";

                    const gradeColor = grade.startsWith("A") ? "#22c55e"
                                     : grade.startsWith("B") ? "#60a5fa"
                                     : grade.startsWith("C") ? "#f59e0b"
                                     : "#ef4444";

                    return { owner, roster, avgScore, topScore, eliteCount, starterCnt,
                             avgAge, cliffCnt, injCnt, posDep, contenderScore,
                             window, windowColor, grade, gradeColor };
                  }).filter(Boolean).sort((a,b)=>b.contenderScore-a.contenderScore);

                  const myGrade = ownerGrades.find(g=>g.owner==="PunterParty");

                  return (
                    <>
                      {/* My roster callout */}
                      {myGrade&&(
                        <div style={{background:"#0a1118",border:"2px solid #22c55e",borderRadius:12,
                          padding:"16px 20px",marginBottom:20,
                          boxShadow:"0 0 20px rgba(34,197,94,0.15)"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
                            <div>
                              <div style={{fontSize:8,color:"#22c55e",letterSpacing:2,marginBottom:4,fontWeight:700}}>YOUR ROSTER — PUNTERPARTY</div>
                              <div style={{display:"flex",alignItems:"baseline",gap:10}}>
                                <span style={{fontSize:48,fontWeight:900,color:myGrade.gradeColor,lineHeight:1}}>{myGrade.grade}</span>
                                <div>
                                  <div style={{fontSize:13,fontWeight:700,color:myGrade.windowColor,letterSpacing:2}}>{myGrade.window}</div>
                                  <div style={{fontSize:10,color:"#4b6580"}}>#{ownerGrades.findIndex(g=>g.owner==="PunterParty")+1} of {ownerGrades.length} teams</div>
                                </div>
                              </div>
                            </div>
                            <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
                              {[
                                ["AVG SCORE", myGrade.avgScore.toFixed(1),"#e2e8f0"],
                                ["ELITE",     myGrade.eliteCount,         "#22c55e"],
                                ["STARTERS",  myGrade.starterCnt,         "#60a5fa"],
                                ["AVG AGE",   myGrade.avgAge.toFixed(1),  "#f59e0b"],
                                ["ON CLIFF",  myGrade.cliffCnt,           "#f97316"],
                                ["INJURED",   myGrade.injCnt,             "#ef4444"],
                              ].map(([k,v,c])=>(
                                <div key={k} style={{textAlign:"center"}}>
                                  <div style={{fontSize:18,fontWeight:900,color:c}}>{v}</div>
                                  <div style={{fontSize:7,color:"#4b6580",letterSpacing:1}}>{k}</div>
                                </div>
                              ))}
                            </div>
                          </div>
                          {/* Position depth bar for my roster */}
                          <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}}>
                            {POS_ORDER.map(pos=>{
                              const dep = myGrade.posDep[pos];
                              if (!dep.count) return null;
                              const fill = Math.min(100, dep.avg);
                              const col  = dep.avg>=70?"#22c55e":dep.avg>=45?"#60a5fa":dep.avg>=25?"#f59e0b":"#ef4444";
                              return(
                                <div key={pos} style={{flex:"1 1 60px",minWidth:50}}>
                                  <div style={{fontSize:8,color:"#4b6580",marginBottom:3,letterSpacing:1,display:"flex",justifyContent:"space-between"}}>
                                    <span>{pos}</span><span style={{color:col}}>{dep.avg.toFixed(0)}</span>
                                  </div>
                                  <div style={{height:4,background:"#1e2d3d",borderRadius:2,overflow:"hidden"}}>
                                    <div style={{height:"100%",width:`${fill}%`,background:col,borderRadius:2}}/>
                                  </div>
                                  <div style={{fontSize:7,color:"#2a3d52",marginTop:2}}>{dep.count} players</div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}

                      {/* League leaderboard */}
                      <div style={{fontSize:9,color:"#4b6580",letterSpacing:2,fontWeight:700,marginBottom:10}}>LEAGUE ROSTER GRADES</div>
                      <div style={{borderRadius:8,border:"1px solid #1e2d3d",overflow:"hidden",marginBottom:20}}>
                        <table style={{width:"100%",borderCollapse:"collapse"}}>
                          <thead>
                            <tr>
                              {[["#",32],["TEAM",180],["GRD",50],["WINDOW",90],["AVG",55],["ELITE",55],["STR",50],["AVG AGE",65],["CLIFF",55],["INJ",45]].map(([h,w])=>(
                                <th key={h} style={{padding:"7px 8px",background:"#0c151e",color:"#4b6580",
                                  fontSize:9,letterSpacing:1.5,fontWeight:700,textAlign:"center",
                                  borderRight:"1px solid #1e2d3d",width:w}}>
                                  {h}
                                </th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {ownerGrades.map((g,i)=>{
                              const isMe = g.owner==="PunterParty";
                              return(
                                <tr key={g.owner}
                                  style={{background:isMe?"#0f2b1a":i%2===0?"#080d14":"#0a1118"}}>
                                  <td style={{padding:"8px",textAlign:"center",borderBottom:"1px solid #0f1923",fontSize:9,color:"#2a3d52"}}>{i+1}</td>
                                  <td style={{padding:"8px 10px",borderBottom:"1px solid #0f1923",fontWeight:isMe?900:600,color:isMe?"#22c55e":"#e2e8f0",fontSize:11}}>
                                    {g.owner}{isMe&&<span style={{fontSize:7,color:"#22c55e",marginLeft:5}}>YOU</span>}
                                  </td>
                                  <td style={{padding:"8px",textAlign:"center",borderBottom:"1px solid #0f1923"}}>
                                    <span style={{fontSize:14,fontWeight:900,color:g.gradeColor}}>{g.grade}</span>
                                  </td>
                                  <td style={{padding:"8px",textAlign:"center",borderBottom:"1px solid #0f1923"}}>
                                    <span style={{fontSize:8,background:g.windowColor+"22",color:g.windowColor,
                                      border:`1px solid ${g.windowColor}44`,borderRadius:3,
                                      padding:"2px 6px",fontWeight:700,letterSpacing:1}}>
                                      {g.window}
                                    </span>
                                  </td>
                                  <td style={{padding:"8px",textAlign:"center",borderBottom:"1px solid #0f1923",fontSize:11,color:"#e2e8f0",fontWeight:700}}>{g.avgScore.toFixed(1)}</td>
                                  <td style={{padding:"8px",textAlign:"center",borderBottom:"1px solid #0f1923",fontSize:11,color:"#22c55e",fontWeight:700}}>{g.eliteCount}</td>
                                  <td style={{padding:"8px",textAlign:"center",borderBottom:"1px solid #0f1923",fontSize:11,color:"#60a5fa"}}>{g.starterCnt}</td>
                                  <td style={{padding:"8px",textAlign:"center",borderBottom:"1px solid #0f1923",fontSize:11,color:"#f59e0b"}}>{g.avgAge.toFixed(1)}</td>
                                  <td style={{padding:"8px",textAlign:"center",borderBottom:"1px solid #0f1923",fontSize:11,color:g.cliffCnt>2?"#f97316":"#4b6580"}}>{g.cliffCnt}</td>
                                  <td style={{padding:"8px",textAlign:"center",borderBottom:"1px solid #0f1923",fontSize:11,color:g.injCnt>0?"#ef4444":"#4b6580"}}>{g.injCnt}</td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>

                      {/* Window legend */}
                      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                        {[["REBUILD","#60a5fa","Avg age <25 · building through youth"],
                          ["RISING","#22c55e","Avg age 25-27 · ascending window"],
                          ["CONTEND","#f59e0b","Avg age 27-29 · competitive now"],
                          ["WIN NOW","#ef4444","Avg age 29-31 · peak window closing"],
                          ["DECLINING","#6b7280","Avg age 31+ · transition needed"]
                        ].map(([w,c,desc])=>(
                          <div key={w} style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:8,background:c+"22",color:c,border:`1px solid ${c}44`,
                              borderRadius:3,padding:"2px 6px",fontWeight:700,letterSpacing:1}}>{w}</span>
                            <span style={{fontSize:9,color:"#2a3d52"}}>{desc}</span>
                          </div>
                        ))}
                      </div>
                    </>
                  );
                })()}
              </div>
            )}

            {tab==="log"&&(
              <div style={{background:"#0a1118",border:"1px solid #1e2d3d",borderRadius:8,padding:18}}>
                <div style={{fontSize:9,color:"#22c55e",letterSpacing:2,marginBottom:10,fontWeight:700}}>▸ SYNC LOG</div>
                {progress.length===0
                  ?<div style={{color:"#2a3d52",fontSize:11}}>No sync run yet.</div>
                  :progress.map((e,i)=>(
                    <div key={i} style={{fontSize:11,padding:"3px 0",borderBottom:"1px solid #0f1923",
                      color:e.type==="success"?"#22c55e":e.type==="error"?"#ef4444":e.type==="done"?"#0ea5e9":"#4b6580"}}>
                      <span style={{color:"#2a3d52",marginRight:8,fontSize:9}}>{e.ts}</span>{e.msg}
                    </div>
                  ))
                }
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
